<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Wildfire Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/realtime.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
      <a class="navbar-brand" href="/">Wildfire Detection</a>
      <button id="theme-toggle" class="btn btn-outline-light ms-3">Dark Mode</button>
    </div>
  </nav>

  <div class="container-fluid mt-3 px-3">
    <div class="row g-3">
      <!-- Left Column -->
      <div class="col-lg-8">
        <!-- Map Card -->
        <div class="card h-100">
          <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
            <span><i class="fas fa-map me-2"></i>Satellite View</span>
            <small id="map-coordinates" class="badge bg-light text-dark">Lat: 20.5937, Lng: 78.9629</small>
          </div>
          <div class="card-body p-0 position-relative" style="min-height: 500px;">
            <div id="map" class="h-100 w-100"></div>
          </div>
        </div>
      </div>
      
      <!-- Right Column -->
      <div class="col-lg-4">
        <div class="d-flex flex-column h-100 gap-3">
          <!-- Controls Card -->
          <div class="card">
            <div class="card-header bg-danger text-white">
              <i class="fas fa-sliders-h me-2"></i>Controls
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label for="forest-select" class="form-label">Select Forest Region</label>
                <select class="form-select" id="forest-select">
                  <option value="">-- Select --</option>
                  <option value="amazon">Amazon Rainforest</option>
                  <option value="borneo">Borneo Rainforest</option>
                  <option value="congo">Congo Rainforest</option>
                  <option value="western_ghats">Western Ghats</option>
                  <option value="sundarbans">Sundarbans</option>
                </select>
              </div>
              <button id="check-fire-btn" class="btn btn-danger w-100">
                <i class="fas fa-search me-2"></i>Check for Wildfires
              </button>
            </div>
          </div>
          
          <!-- Weather Card -->
          <!-- Weather Card -->
<div class="card flex-grow-1">
  <div class="card-header bg-danger text-white">
    <i class="fas fa-cloud-sun me-2"></i>Weather Information
  </div>
  <div class="card-body" id="weather-info">
    <div class="text-center py-3 h-100 d-flex flex-column justify-content-center">
      <i class="fas fa-map-marker-alt fa-2x text-primary mb-3"></i>
      <p class="mb-0">Click on map to view weather</p>
    </div>
  </div>
</div>
        </div>
      </div>
    </div>
    
    <!-- Satellite Image Row -->
    <div class="row mt-3">
      <div class="col-12">
        <div class="card">
          <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
            <div>
              <i class="fas fa-satellite me-2"></i>Satellite Image Analysis
            </div>
            <div id="analysis-timestamp" class="small text-light">
              <i class="fas fa-clock me-1"></i>
              <span id="current-date"></span>
              <span id="current-time" class="ms-2"></span>
            </div>
          </div>
          <div class="card-body">
            <div class="satellite-image-container">
              <div id="satellite-image-container" class="text-center">
                <div class="placeholder-content py-4">
                  <i class="fas fa-satellite fa-3x text-muted mb-3"></i>
                  <p class="mb-0">Satellite image will appear after analysis</p>
                </div>
              </div>
            </div>
            
            <!-- Results Card -->
            <div class="card mt-3">
              <div class="card-header bg-secondary text-white">
                <i class="fas fa-chart-bar me-2"></i>Analysis Results
              </div>
              <div id="fire-results" class="card-body">
                <div class="text-center py-3">
                  <i class="fas fa-search fa-2x text-muted mb-3"></i>
                  <p class="mb-0">No analysis data available</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-danger text-white text-center py-3 mt-4">
    <div class="container">
      <p class="mb-0">&copy; 2025 Wildfire Detection | Built for a safer planet 🌱</p>
    </div>
  </footer>
   

  <script>
    window.appConfig = {
      nasaApiKey: "{{ config.NASA_API_KEY }}" 
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/map.js') }}"></script>
  <script src="{{ url_for('static', filename='js/realtime.js') }}"></script>
  
</body>
</html>
